<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your OTP Code</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f5f5f5; padding: 20px;">

<div style="max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 8px;">

    <h2 style="color: #333;">Password Reset Request</h2>

    <p style="font-size: 15px; color: #444;">
        Your OTP code is:
    </p>

    <h1 style="letter-spacing: 6px; font-size: 36px; color: #2c3e50; text-align: center;">
        [[${otp}]]
    </h1>

    <p style="font-size: 14px; color: #444;">
        This OTP is valid for <b>5 minutes</b>.
    </p>

    <p style="font-size: 14px; color: #444;">
        If you did not request this password reset, please ignore this email.
    </p>

    <hr style="margin: 20px 0;">

    <p style="font-size: 12px; color: #777; text-align: center;">
        <i>(This is an automated message. Do not reply.)</i>
    </p>

</div>

</body>
</html>
